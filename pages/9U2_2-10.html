<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones Combinadas de Raíces Cuadradas - Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #04071B;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #054F8E 0%, #04071B 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .navbar {
            background-color: #D2E4FD;
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 2px solid #054F8E;
        }

        .navbar a {
            color: #054F8E;
            text-decoration: none;
        }

        .navbar span {
            color: #054F8E;
            margin: 0 0.5rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .calculator {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #054F8E;
        }

        .calc-title {
            text-align: center;
            color: #054F8E;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .input-section {
            margin-bottom: 1.5rem;
        }

        .calc-input {
            width: 100%;
            padding: 1.2rem;
            border: 3px solid #054F8E;
            border-radius: 8px;
            font-size: 1.4rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            background: #F8F9FA;
            margin-bottom: 1rem;
        }

        .calc-input:focus {
            outline: none;
            border-color: #F5B7BC;
            box-shadow: 0 0 0 4px rgba(245, 183, 188, 0.3);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .key {
            padding: 1.2rem 0.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            border: 2px solid #054F8E;
            color: #054F8E;
        }

        .key:hover {
            background: #054F8E;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(5, 79, 142, 0.3);
        }

        .key.operator {
            background: #F5B7BC;
            border-color: #F5B7BC;
            color: #04071B;
        }

        .key.function {
            background: #CDE9D6;
            border-color: #CDE9D6;
            color: #04071B;
        }

        .key.clear {
            background: #F8D3CF;
            border-color: #F8D3CF;
            color: #04071B;
        }

        .key.equals {
            background: #054F8E;
            color: white;
            grid-column: span 2;
        }

        .result-container {
            margin-top: 2rem;
            display: none;
        }

        .result-container.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            background: linear-gradient(135deg, #CDE9D6, #D2E4FD);
            border: 3px solid #054F8E;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #04071B;
        }

        .error-message {
            background: #F8D3CF;
            border: 2px solid #04071B;
            color: #04071B;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .keyboard {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .key.equals {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Centro Escolar Cantón Los Prados</h1>
    </header>

    <nav class="navbar">
        <a href="#">Inicio</a> <span>›</span> 
        <a href="#">9° Grado</a> <span>›</span> 
        <a href="#">Matemáticas</a> <span>›</span> 
        <a href="#">Unidad 2</a> <span>›</span> 
        <span>Calculadora de Raíces</span>
    </nav>

    <div class="container">
        <div class="calculator">
            <h2 class="calc-title">🧮 Calculadora de Raíces Cuadradas</h2>
            
            <div class="input-section">
                <input type="text" class="calc-input" id="inputExpr" placeholder="Ej: √3(√3+5)" readonly>
            </div>

            <div class="keyboard">
                <button class="key function" onclick="addKey('√(')">√(</button>
                <button class="key function" onclick="addKey('(')">(</button>
                <button class="key function" onclick="addKey(')')">)</button>
                <button class="key clear" onclick="clearAll()">C</button>
                <button class="key clear" onclick="deleteLast()">⌫</button>
                
                <button class="key" onclick="addKey('7')">7</button>
                <button class="key" onclick="addKey('8')">8</button>
                <button class="key" onclick="addKey('9')">9</button>
                <button class="key operator" onclick="addKey('+')">+</button>
                <button class="key operator" onclick="addKey('-')">-</button>
                
                <button class="key" onclick="addKey('4')">4</button>
                <button class="key" onclick="addKey('5')">5</button>
                <button class="key" onclick="addKey('6')">6</button>
                <button class="key function" onclick="addKey('√')">√</button>
                <button class="key operator" onclick="addKey('*')">×</button>
                
                <button class="key" onclick="addKey('1')">1</button>
                <button class="key" onclick="addKey('2')">2</button>
                <button class="key" onclick="addKey('3')">3</button>
                <button class="key function" onclick="addKey('²')">x²</button>
                <button class="key function" onclick="addKey('√')">√</button>
                
                <button class="key" onclick="addKey('0')">0</button>
                <button class="key" onclick="addKey('.')">.</button>
                <button class="key equals" onclick="calculate()">Calcular =</button>
            </div>

            <div class="error-message" id="errorMsg"></div>

            <div class="result-container" id="resultContainer">
                <div class="result-box" id="resultBox"></div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '';

        function addKey(value) {
            currentInput += value;
            document.getElementById('inputExpr').value = currentInput;
        }

        function clearAll() {
            currentInput = '';
            document.getElementById('inputExpr').value = '';
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('errorMsg').style.display = 'none';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            document.getElementById('inputExpr').value = currentInput;
        }

        function simplifySqrt(num) {
            if (num < 0) return { coef: 1, sqrt: num, text: `√(${num})` };
            if (num === 0) return { coef: 0, sqrt: 0, text: '0' };
            
            for (let i = Math.floor(Math.sqrt(num)); i >= 2; i--) {
                if (num % (i * i) === 0) {
                    const remaining = num / (i * i);
                    if (remaining === 1) {
                        return { coef: i, sqrt: null, text: i.toString(), perfect: true };
                    } else {
                        return { coef: i, sqrt: remaining, text: `${i}√${remaining}`, perfect: false };
                    }
                }
            }
            return { coef: 1, sqrt: num, text: `√${num}`, perfect: false };
        }

        function calculate() {
            const expr = currentInput.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');
            const resultBox = document.getElementById('resultBox');
            
            errorMsg.style.display = 'none';
            resultContainer.classList.remove('active');
            
            if (!expr) {
                errorMsg.textContent = '⚠️ Ingresa una expresión';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                // Limpiar expresión
                let cleanExpr = expr.replace(/\s/g, '');
                
                // Detectar tipo de expresión
                // Patrón: √a(√b±c)
                const pattern1 = /^√(\d+)\(√(\d+)([+-])(\d+)\)$/;
                const match1 = cleanExpr.match(pattern1);
                
                if (match1) {
                    const outerSqrt = parseInt(match1[1]);
                    const innerSqrt = parseInt(match1[2]);
                    const operator = match1[3];
                    const constant = parseInt(match1[4]);
                    
                    // Simplificar raíz interior si es posible
                    const simplified = simplifySqrt(innerSqrt);
                    
                    // Calcular primer término
                    let term1;
                    if (simplified.perfect) {
                        // √a × b = b√a (si b es resultado de √(b²))
                        term1 = simplified.coef * outerSqrt;
                    } else if (outerSqrt === innerSqrt) {
                        // √a × a = a
                        term1 = outerSqrt;
                    } else {
                        // √a × b√c = b√(ac)
                        const product = outerSqrt * simplified.sqrt;
                        const termSimplified = simplifySqrt(product);
                        term1 = simplified.coef !== 1 ? 
                            (termSimplified.perfect ? 
                                `${simplified.coef * termSimplified.coef}` : 
                                `${simplified.coef}${termSimplified.text}`) : 
                            termSimplified.text;
                    }
                    
                    // Segundo término
                    const term2 = `${constant}√${outerSqrt}`;
                    
                    // Resultado
                    const result = `${term1} ${operator} ${term2}`;
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                // Patrón: √a(b±√c)
                const pattern2 = /^√(\d+)\((\d+)([+-])√(\d+)\)$/;
                const match2 = cleanExpr.match(pattern2);
                
                if (match2) {
                    const outerSqrt = parseInt(match2[1]);
                    const constant = parseInt(match2[2]);
                    const operator = match2[3];
                    const innerSqrt = parseInt(match2[4]);
                    
                    const term1 = `${constant}√${outerSqrt}`;
                    const product = outerSqrt * innerSqrt;
                    const term2 = simplifySqrt(product).text;
                    
                    const result = `${term1} ${operator} ${term2}`;
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                // Patrón: √a(√b±√c)
                const pattern3 = /^√(\d+)\(√(\d+)([+-])√(\d+)\)$/;
                const match3 = cleanExpr.match(pattern3);
                
                if (match3) {
                    const outerSqrt = parseInt(match3[1]);
                    const firstSqrt = parseInt(match3[2]);
                    const operator = match3[3];
                    const secondSqrt = parseInt(match3[4]);
                    
                    const product1 = outerSqrt * firstSqrt;
                    const product2 = outerSqrt * secondSqrt;
                    const term1 = simplifySqrt(product1).text;
                    const term2 = simplifySqrt(product2).text;
                    
                    const result = `${term1} ${operator} ${term2}`;
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                // Patrón: a(√b±c)
                const pattern4 = /^(\d+)\(√(\d+)([+-])(\d+)\)$/;
                const match4 = cleanExpr.match(pattern4);
                
                if (match4) {
                    const constant = parseInt(match4[1]);
                    const innerSqrt = parseInt(match4[2]);
                    const operator = match4[3];
                    const lastConst = parseInt(match4[4]);
                    
                    const simplified = simplifySqrt(innerSqrt);
                    const term1 = simplified.perfect ? 
                        `${constant * simplified.coef}` : 
                        `${constant}${simplified.text}`;
                    const term2 = constant * lastConst;
                    
                    const result = `${term1} ${operator} ${term2}`;
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                // Patrón: √a(b±c)
                const pattern5 = /^√(\d+)\((\d+)([+-])(\d+)\)$/;
                const match5 = cleanExpr.match(pattern5);
                
                if (match5) {
                    const outerSqrt = parseInt(match5[1]);
                    const firstConst = parseInt(match5[2]);
                    const operator = match5[3];
                    const secondConst = parseInt(match5[4]);
                    
                    const sum = operator === '+' ? firstConst + secondConst : firstConst - secondConst;
                    const result = `${sum}√${outerSqrt}`;
                    
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                // Patrón: √a(√b)
                const pattern6 = /^√(\d+)\(√(\d+)\)$/;
                const match6 = cleanExpr.match(pattern6);
                
                if (match6) {
                    const firstSqrt = parseInt(match6[1]);
                    const secondSqrt = parseInt(match6[2]);
                    const product = firstSqrt * secondSqrt;
                    const result = simplifySqrt(product).text;
                    
                    resultBox.innerHTML = `<div style="font-size: 0.9rem; margin-bottom: 0.5rem; color: #666;">Resultado:</div>${result}`;
                    resultContainer.classList.add('active');
                    return;
                }
                
                errorMsg.textContent = '⚠️ Formato no reconocido. Usa: √a(√b+c), √a(b+√c), etc.';
                errorMsg.style.display = 'block';
                
            } catch (error) {
                errorMsg.textContent = '⚠️ Error al calcular';
                errorMsg.style.display = 'block';
            }
        }

        // Teclado físico
        document.addEventListener('keydown', function(e) {
            const validKeys = '0123456789+-().';
            if (validKeys.includes(e.key)) {
                addKey(e.key);
            } else if (e.key === 'Backspace') {
                deleteLast();
            } else if (e.key === 'Enter') {
                calculate();
            } else if (e.key === 'Escape') {
                clearAll();
            }
        });
    </script>
</body>
</html>
