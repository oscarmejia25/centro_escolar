<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones Combinadas de Raíces Cuadradas - Calculadora Avanzada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #04071B;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #054F8E 0%, #04071B 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .navbar {
            background-color: #D2E4FD;
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 2px solid #054F8E;
        }

        .navbar a {
            color: #054F8E;
            text-decoration: none;
        }

        .navbar span {
            color: #054F8E;
            margin: 0 0.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .calculator {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #054F8E;
        }

        .calc-title {
            text-align: center;
            color: #054F8E;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .calc-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-section {
            margin-bottom: 1.5rem;
        }

        .calc-input {
            width: 100%;
            padding: 1.2rem;
            border: 3px solid #054F8E;
            border-radius: 8px;
            font-size: 1.4rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            background: #F8F9FA;
            margin-bottom: 1rem;
        }

        .calc-input:focus {
            outline: none;
            border-color: #F5B7BC;
            box-shadow: 0 0 0 4px rgba(245, 183, 188, 0.3);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .key {
            padding: 1.2rem 0.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            border: 2px solid #054F8E;
            color: #054F8E;
        }

        .key:hover {
            background: #054F8E;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(5, 79, 142, 0.3);
        }

        .key.operator {
            background: #F5B7BC;
            border-color: #F5B7BC;
            color: #04071B;
        }

        .key.function {
            background: #CDE9D6;
            border-color: #CDE9D6;
            color: #04071B;
        }

        .key.clear {
            background: #F8D3CF;
            border-color: #F8D3CF;
            color: #04071B;
        }

        .key.equals {
            background: #054F8E;
            color: white;
            grid-column: span 2;
        }

        .examples-section {
            background: #FFF1CB;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .examples-title {
            font-weight: 600;
            color: #04071B;
            margin-bottom: 0.5rem;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.5rem;
        }

        .example-btn {
            background: white;
            border: 2px solid #054F8E;
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }

        .example-btn:hover {
            background: #054F8E;
            color: white;
            transform: translateY(-2px);
        }

        .steps-container {
            margin-top: 2rem;
            display: none;
        }

        .steps-container.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-card {
            background: linear-gradient(to right, #F8F9FA, white);
            border-left: 5px solid #054F8E;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .step-number {
            background: #054F8E;
            color: white;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
        }

        .step-content {
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .formula {
            background: white;
            border: 2px solid #D2E4FD;
            border-radius: 6px;
            padding: 1rem;
            margin: 0.8rem 0;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
        }

        .final-result {
            background: linear-gradient(135deg, #CDE9D6, #D2E4FD);
            border: 3px solid #054F8E;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-top: 1.5rem;
            color: #04071B;
        }

        .error-message {
            background: #F8D3CF;
            border: 2px solid #04071B;
            color: #04071B;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .info-box {
            background: #D2E4FD;
            border-left: 4px solid #054F8E;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 6px;
        }

        .highlight {
            background: #FFF1CB;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .keyboard {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .key.equals {
                grid-column: span 2;
            }
            
            .examples-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Centro Escolar Cantón Los Prados</h1>
    </header>

    <nav class="navbar">
        <a href="#">Inicio</a> <span>›</span> 
        <a href="#">9° Grado</a> <span>›</span> 
        <a href="#">Matemáticas</a> <span>›</span> 
        <a href="#">Unidad 2</a> <span>›</span> 
        <span>Calculadora de Raíces</span>
    </nav>

    <div class="container">
        <div class="calculator">
            <h2 class="calc-title">🧮 Calculadora de Operaciones con Raíces</h2>
            <p class="calc-subtitle">Resuelve multiplicaciones con raíces cuadradas paso a paso</p>
            
            <div class="input-section">
                <input type="text" class="calc-input" id="inputExpr" placeholder="Ej: √3(√3+5) o √5(√45+7)" readonly>
            </div>

            <div class="keyboard">
                <button class="key function" onclick="addKey('√(')">√(</button>
                <button class="key function" onclick="addKey('(')">(</button>
                <button class="key function" onclick="addKey(')')">)</button>
                <button class="key clear" onclick="clearAll()">C</button>
                <button class="key clear" onclick="deleteLast()">⌫</button>
                <button class="key function" onclick="addKey('√')">√</button>
                
                <button class="key" onclick="addKey('7')">7</button>
                <button class="key" onclick="addKey('8')">8</button>
                <button class="key" onclick="addKey('9')">9</button>
                <button class="key operator" onclick="addKey('+')">+</button>
                <button class="key operator" onclick="addKey('-')">-</button>
                <button class="key operator" onclick="addKey('*')">×</button>
                
                <button class="key" onclick="addKey('4')">4</button>
                <button class="key" onclick="addKey('5')">5</button>
                <button class="key" onclick="addKey('6')">6</button>
                <button class="key function" onclick="addKey('²')">x²</button>
                <button class="key function" onclick="addKey('√')">√</button>
                <button class="key function" onclick="addKey('√')">√</button>
                
                <button class="key" onclick="addKey('1')">1</button>
                <button class="key" onclick="addKey('2')">2</button>
                <button class="key" onclick="addKey('3')">3</button>
                <button class="key" onclick="addKey('0')">0</button>
                <button class="key" onclick="addKey('.')">.</button>
                <button class="key equals" onclick="calculate()">Calcular =</button>
            </div>

            <div class="examples-section">
                <div class="examples-title">📋 Ejemplos para probar:</div>
                <div class="examples-grid">
                    <button class="example-btn" onclick="loadExample('√3(√3+5)')">√3(√3+5)</button>
                    <button class="example-btn" onclick="loadExample('√5(√45+7)')">√5(√45+7)</button>
                    <button class="example-btn" onclick="loadExample('√2(√2-3)')">√2(√2-3)</button>
                    <button class="example-btn" onclick="loadExample('√7(√7+6)')">√7(√7+6)</button>
                    <button class="example-btn" onclick="loadExample('√6(√24+9)')">√6(√24+9)</button>
                    <button class="example-btn" onclick="loadExample('√3(√75-4)')">√3(√75-4)</button>
                    <button class="example-btn" onclick="loadExample('√5(√20-6)')">√5(√20-6)</button>
                    <button class="example-btn" onclick="loadExample('√7(√7+√3)')">√7(√7+√3)</button>
                    <button class="example-btn" onclick="loadExample('√2(√18+√48)')">√2(√18+√48)</button>
                    <button class="example-btn" onclick="loadExample('3(√5+2)')">3(√5+2)</button>
                </div>
            </div>

            <div class="error-message" id="errorMsg"></div>

            <div class="steps-container" id="stepsContainer"></div>
        </div>
    </div>

    <script>
        let currentInput = '';

        function addKey(value) {
            currentInput += value;
            document.getElementById('inputExpr').value = currentInput;
        }

        function clearAll() {
            currentInput = '';
            document.getElementById('inputExpr').value = '';
            document.getElementById('stepsContainer').innerHTML = '';
            document.getElementById('stepsContainer').classList.remove('active');
            document.getElementById('errorMsg').style.display = 'none';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            document.getElementById('inputExpr').value = currentInput;
        }

        function loadExample(expr) {
            currentInput = expr;
            document.getElementById('inputExpr').value = expr;
            calculate();
        }

        function simplifySqrt(num) {
            if (num < 0) return { coef: 1, sqrt: num, text: `√(${num})`, simplified: false };
            if (num === 0) return { coef: 0, sqrt: 0, text: '0', simplified: true };
            
            for (let i = Math.floor(Math.sqrt(num)); i >= 2; i--) {
                if (num % (i * i) === 0) {
                    const remaining = num / (i * i);
                    if (remaining === 1) {
                        return { coef: i, sqrt: null, text: i.toString(), simplified: true, perfect: true };
                    } else {
                        return { coef: i, sqrt: remaining, text: `${i}√${remaining}`, simplified: true, perfect: false };
                    }
                }
            }
            return { coef: 1, sqrt: num, text: `√${num}`, simplified: false, perfect: false };
        }

        function parseExpression(expr) {
            // Casos a manejar:
            // 1. √a(√b+c), √a(√b-c)
            // 2. √a(b+√c), √a(b-√c)
            // 3. √a(√b+√c), √a(√b-√c)
            // 4. a(√b+c), a(√b-c)
            // 5. √a(b+c), √a(b-c)
            
            expr = expr.replace(/\s/g, '');
            
            // Patrón: √a(√b±c)
            const pattern1 = /^√(\d+)\(√(\d+)([+-])(\d+)\)$/;
            const match1 = expr.match(pattern1);
            if (match1) {
                return {
                    type: 'sqrt_times_sqrt_plus_const',
                    outerSqrt: parseInt(match1[1]),
                    innerSqrt: parseInt(match1[2]),
                    operator: match1[3],
                    constant: parseInt(match1[4]),
                    original: expr
                };
            }
            
            // Patrón: √a(b±√c)
            const pattern2 = /^√(\d+)\((\d+)([+-])√(\d+)\)$/;
            const match2 = expr.match(pattern2);
            if (match2) {
                return {
                    type: 'sqrt_times_const_plus_sqrt',
                    outerSqrt: parseInt(match2[1]),
                    constant: parseInt(match2[2]),
                    operator: match2[3],
                    innerSqrt: parseInt(match2[4]),
                    original: expr
                };
            }
            
            // Patrón: √a(√b±√c)
            const pattern3 = /^√(\d+)\(√(\d+)([+-])√(\d+)\)$/;
            const match3 = expr.match(pattern3);
            if (match3) {
                return {
                    type: 'sqrt_times_sqrt_plus_sqrt',
                    outerSqrt: parseInt(match3[1]),
                    firstSqrt: parseInt(match3[2]),
                    operator: match3[3],
                    secondSqrt: parseInt(match3[4]),
                    original: expr
                };
            }
            
            // Patrón: a(√b±c) donde a es número normal
            const pattern4 = /^(\d+)\(√(\d+)([+-])(\d+)\)$/;
            const match4 = expr.match(pattern4);
            if (match4) {
                return {
                    type: 'const_times_sqrt_plus_const',
                    constant: parseInt(match4[1]),
                    innerSqrt: parseInt(match4[2]),
                    operator: match4[3],
                    lastConst: parseInt(match4[4]),
                    original: expr
                };
            }
            
            // Patrón: √a(b±c) donde b y c son números normales
            const pattern5 = /^√(\d+)\((\d+)([+-])(\d+)\)$/;
            const match5 = expr.match(pattern5);
            if (match5) {
                return {
                    type: 'sqrt_times_const_plus_const',
                    outerSqrt: parseInt(match5[1]),
                    firstConst: parseInt(match5[2]),
                    operator: match5[3],
                    secondConst: parseInt(match5[4]),
                    original: expr
                };
            }
            
            // Patrón: √a(√b) - solo multiplicación de raíces
            const pattern6 = /^√(\d+)\(√(\d+)\)$/;
            const match6 = expr.match(pattern6);
            if (match6) {
                return {
                    type: 'sqrt_times_sqrt',
                    firstSqrt: parseInt(match6[1]),
                    secondSqrt: parseInt(match6[2]),
                    original: expr
                };
            }
            
            return null;
        }

        function calculate() {
            const expr = currentInput.trim();
            const stepsContainer = document.getElementById('stepsContainer');
            const errorMsg = document.getElementById('errorMsg');
            
            stepsContainer.innerHTML = '';
            errorMsg.style.display = 'none';
            
            if (!expr) {
                errorMsg.textContent = '⚠️ Ingresa una expresión';
                errorMsg.style.display = 'block';
                return;
            }

            const parsed = parseExpression(expr);
            
            if (!parsed) {
                errorMsg.textContent = '⚠️ Formato no reconocido. Usa: √a(√b+c), √a(b+√c), √a(√b+√c), etc.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                let steps = [];
                
                // Paso 1: Expresión original
                steps.push({
                    title: 'Expresión original',
                    content: `<div class="formula"><strong>${expr}</strong></div>`
                });

                switch(parsed.type) {
                    case 'sqrt_times_sqrt_plus_const':
                        steps = solveSqrtTimesSqrtPlusConst(parsed, steps);
                        break;
                    case 'sqrt_times_const_plus_sqrt':
                        steps = solveSqrtTimesConstPlusSqrt(parsed, steps);
                        break;
                    case 'sqrt_times_sqrt_plus_sqrt':
                        steps = solveSqrtTimesSqrtPlusSqrt(parsed, steps);
                        break;
                    case 'const_times_sqrt_plus_const':
                        steps = solveConstTimesSqrtPlusConst(parsed, steps);
                        break;
                    case 'sqrt_times_const_plus_const':
                        steps = solveSqrtTimesConstPlusConst(parsed, steps);
                        break;
                    case 'sqrt_times_sqrt':
                        steps = solveSqrtTimesSqrt(parsed, steps);
                        break;
                }

                // Mostrar todos los pasos
                steps.forEach((step, index) => {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'step-card';
                    stepDiv.innerHTML = `
                        <div class="step-number">${step.title}</div>
                        <div class="step-content">${step.content}</div>
                    `;
                    stepsContainer.appendChild(stepDiv);
                });

                stepsContainer.classList.add('active');

            } catch (error) {
                errorMsg.textContent = '⚠️ Error al calcular: ' + error.message;
                errorMsg.style.display = 'block';
            }
        }

        function solveSqrtTimesSqrtPlusConst(parsed, steps) {
            const { outerSqrt, innerSqrt, operator, constant } = parsed;
            
            // Verificar si se puede simplificar la raíz interior
            const simplified = simplifySqrt(innerSqrt);
            if (simplified.simplified) {
                steps.push({
                    title: 'Paso 1: Simplificar la raíz interior',
                    content: `
                        <div class="formula">√${innerSqrt} = ${simplified.text}</div>
                        <div class="info-box">
                            Descomponemos √${innerSqrt} buscando cuadrados perfectos.
                        </div>
                    `
                });
            }
            
            // Aplicar propiedad distributiva
            const innerExpr = simplified.simplified ? simplified.text : `√${innerSqrt}`;
            steps.push({
                title: 'Paso 2: Aplicar propiedad distributiva',
                content: `
                    <div class="formula">
                        √${outerSqrt}(${innerExpr} ${operator} ${constant})<br><br>
                        = √${outerSqrt} × ${innerExpr} ${operator} √${outerSqrt} × ${constant}
                    </div>
                    <div class="info-box">
                        Multiplicamos √${outerSqrt} por cada término del paréntesis.
                    </div>
                `
            });
            
            // Resolver primer término
            let term1, term1Result;
            if (simplified.simplified && !simplified.perfect) {
                // √a × b√c = b√(ac)
                const product = outerSqrt * simplified.sqrt;
                const termSimplified = simplifySqrt(product);
                term1 = `√${outerSqrt} × ${simplified.text} = ${simplified.coef}√(${outerSqrt}×${simplified.sqrt})`;
                term1Result = termSimplified.simplified && !termSimplified.perfect ? 
                    `${simplified.coef}√${product}` : 
                    `${simplified.coef * outerSqrt}`;
            } else if (simplified.perfect) {
                // √a × b = b√a
                term1 = `√${outerSqrt} × ${simplified.coef} = ${simplified.coef}√${outerSqrt}`;
                term1Result = `${simplified.coef}√${outerSqrt}`;
            } else {
                // √a × √a = a
                term1 = `√${outerSqrt} × √${innerSqrt} = √(${outerSqrt}×${innerSqrt})`;
                if (outerSqrt === innerSqrt) {
                    term1Result = `${outerSqrt}`;
                } else {
                    const product = outerSqrt * innerSqrt;
                    const termSimplified = simplifySqrt(product);
                    term1Result = termSimplified.text;
                }
            }
            
            // Resolver segundo término
            const term2 = `${constant}√${outerSqrt}`;
            
            steps.push({
                title: 'Paso 3: Resolver cada término',
                content: `
                    <div class="formula">
                        <strong>Primer término:</strong><br>
                        ${term1}<br>
                        = <strong>${term1Result}</strong><br><br>
                        <strong>Segundo término:</strong><br>
                        √${outerSqrt} × ${constant} = <strong>${term2}</strong>
                    </div>
                `
            });
            
            // Resultado final
            const finalResult = `${term1Result} ${operator} ${term2}`;
            steps.push({
                title: 'Paso 4: Resultado final',
                content: `
                    <div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">
                        ${finalResult}
                    </div>
                `
            });
            
            return steps;
        }

        function solveSqrtTimesConstPlusSqrt(parsed, steps) {
            const { outerSqrt, constant, operator, innerSqrt } = parsed;
            
            steps.push({
                title: 'Paso 1: Aplicar propiedad distributiva',
                content: `
                    <div class="formula">
                        √${outerSqrt}(${constant} ${operator} √${innerSqrt})<br><br>
                        = √${outerSqrt} × ${constant} ${operator} √${outerSqrt} × √${innerSqrt}
                    </div>
                `
            });
            
            const term1 = `${constant}√${outerSqrt}`;
            const product = outerSqrt * innerSqrt;
            const term2Simplified = simplifySqrt(product);
            const term2 = term2Simplified.text;
            
            steps.push({
                title: 'Paso 2: Resolver cada término',
                content: `
                    <div class="formula">
                        <strong>Primer término:</strong> ${constant}√${outerSqrt}<br><br>
                        <strong>Segundo término:</strong> √${outerSqrt} × √${innerSqrt} = √${product} = ${term2}
                    </div>
                `
            });
            
            const finalResult = `${term1} ${operator} ${term2}`;
            steps.push({
                title: 'Paso 3: Resultado final',
                content: `<div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">${finalResult}</div>`
            });
            
            return steps;
        }

        function solveSqrtTimesSqrtPlusSqrt(parsed, steps) {
            const { outerSqrt, firstSqrt, operator, secondSqrt } = parsed;
            
            steps.push({
                title: 'Paso 1: Aplicar propiedad distributiva',
                content: `
                    <div class="formula">
                        √${outerSqrt}(√${firstSqrt} ${operator} √${secondSqrt})<br><br>
                        = √${outerSqrt} × √${firstSqrt} ${operator} √${outerSqrt} × √${secondSqrt}
                    </div>
                `
            });
            
            const product1 = outerSqrt * firstSqrt;
            const product2 = outerSqrt * secondSqrt;
            const term1 = simplifySqrt(product1);
            const term2 = simplifySqrt(product2);
            
            steps.push({
                title: 'Paso 2: Multiplicar las raíces',
                content: `
                    <div class="formula">
                        <strong>Primer término:</strong> √${outerSqrt} × √${firstSqrt} = √${product1} = ${term1.text}<br><br>
                        <strong>Segundo término:</strong> √${outerSqrt} × √${secondSqrt} = √${product2} = ${term2.text}
                    </div>
                `
            });
            
            const finalResult = `${term1.text} ${operator} ${term2.text}`;
            steps.push({
                title: 'Paso 3: Resultado final',
                content: `<div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">${finalResult}</div>`
            });
            
            return steps;
        }

        function solveConstTimesSqrtPlusConst(parsed, steps) {
            const { constant, innerSqrt, operator, lastConst } = parsed;
            
            const simplified = simplifySqrt(innerSqrt);
            if (simplified.simplified) {
                steps.push({
                    title: 'Paso 1: Simplificar la raíz',
                    content: `<div class="formula">√${innerSqrt} = ${simplified.text}</div>`
                });
            }
            
            steps.push({
                title: 'Paso 2: Aplicar propiedad distributiva',
                content: `
                    <div class="formula">
                        ${constant}(${simplified.text} ${operator} ${lastConst})<br><br>
                        = ${constant} × ${simplified.text} ${operator} ${constant} × ${lastConst}
                    </div>
                `
            });
            
            const term1 = simplified.perfect ? 
                `${constant * simplified.coef}` : 
                `${constant}${simplified.text}`;
            const term2 = constant * lastConst;
            
            steps.push({
                title: 'Paso 3: Resolver',
                content: `
                    <div class="formula">
                        = ${term1} ${operator} ${term2}
                    </div>
                `
            });
            
            const finalResult = `${term1} ${operator} ${term2}`;
            steps.push({
                title: 'Paso 4: Resultado final',
                content: `<div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">${finalResult}</div>`
            });
            
            return steps;
        }

        function solveSqrtTimesConstPlusConst(parsed, steps) {
            const { outerSqrt, firstConst, operator, secondConst } = parsed;
            
            const sum = operator === '+' ? firstConst + secondConst : firstConst - secondConst;
            
            steps.push({
                title: 'Paso 1: Resolver el paréntesis',
                content: `
                    <div class="formula">
                        ${firstConst} ${operator} ${secondConst} = ${sum}
                    </div>
                `
            });
            
            steps.push({
                title: 'Paso 2: Multiplicar por la raíz',
                content: `
                    <div class="formula">
                        √${outerSqrt} × ${sum} = ${sum}√${outerSqrt}
                    </div>
                `
            });
            
            const finalResult = `${sum}√${outerSqrt}`;
            steps.push({
                title: 'Paso 3: Resultado final',
                content: `<div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">${finalResult}</div>`
            });
            
            return steps;
        }

        function solveSqrtTimesSqrt(parsed, steps) {
            const { firstSqrt, secondSqrt } = parsed;
            
            const product = firstSqrt * secondSqrt;
            const simplified = simplifySqrt(product);
            
            steps.push({
                title: 'Paso 1: Multiplicar las raíces',
                content: `
                    <div class="formula">
                        √${firstSqrt} × √${secondSqrt} = √(${firstSqrt}×${secondSqrt}) = √${product}
                    </div>
                `
            });
            
            if (simplified.simplified) {
                steps.push({
                    title: 'Paso 2: Simplificar',
                    content: `<div class="formula">√${product} = ${simplified.text}</div>`
                });
            }
            
            steps.push({
                title: 'Paso final: Resultado',
                content: `<div class="formula" style="background: #CDE9D6; font-size: 1.4rem;">${simplified.text}</div>`
            });
            
            return steps;
        }

        // Teclado físico
        document.addEventListener('keydown', function(e) {
            const validKeys = '0123456789+-().';
            if (validKeys.includes(e.key)) {
                addKey(e.key);
            } else if (e.key === 'Backspace') {
                deleteLast();
            } else if (e.key === 'Enter') {
                calculate();
            } else if (e.key === 'Escape') {
                clearAll();
            }
        });
    </script>
