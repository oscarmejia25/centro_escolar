<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Físico Realista - Objetivos Variables</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0c15;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        h1 { 
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }
        .controls {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 24px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-launch { 
            background: linear-gradient(135deg, #f093fb, #f5576c); 
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);        }
        .btn-launch:hover { transform: scale(1.05); }
        .btn-reset { 
            background: linear-gradient(135deg, #4facfe, #00f2fe); 
            color: white;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
        .btn-reset:hover { transform: scale(1.05); }
        
        select { 
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            background: #1a1a2e;
            color: white;
            cursor: pointer;
        }

        .target-display {
            display: flex;
            gap: 15px;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .t-item span { color: #ffd700; font-weight: bold; }
        
        canvas {
            background: #0b0c15;
            border-radius: 8px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }
        
        .stats {
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 12px;
        }
        .stat-item { text-align: center; }
        .stat-label { color: #888; font-size: 10px; text-transform: uppercase; }        .stat-value { color: #00f2fe; font-weight: bold; font-size: 14px; }
        .stat-value.success { color: #00ff88; }
    </style>
</head>
<body>

    <h1>🎯 Simulador Físico - Objetivos Variables</h1>

    <div class="controls">
        <div class="target-display">
            <div class="t-item">Altura Obj: <span id="uiTargetH">-</span></div>
            <div class="t-item">Distancia Obj: <span id="uiTargetD">-</span></div>
            <div class="t-item">Ángulo Calc: <span id="uiAngle">-</span></div>
        </div>
        
        <div style="display:flex; align-items:center; gap:8px;">
            <label>📦 Proyectil:</label>
            <select id="projectileType">
                <option value="maiz">🌽 Maíz (0.3g)</option>
                <option value="frijol">🫘 Frijol (0.5g)</option>
            </select>
        </div>

        <button class="btn-launch" onclick="launch()">🚀 LANZAR</button>
        <button class="btn-reset" onclick="resetSim()">🔄 REINICIAR</button>
    </div>

    <canvas id="simCanvas" width="900" height="550"></canvas>

    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Estado</span>
            <span class="stat-value" id="stEstado">Listo</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Velocidad (v₀)</span>
            <span class="stat-value" id="stVelocidad">-</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Altura Real</span>
            <span class="stat-value" id="stAlturaReal">-</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Distancia Real</span>
            <span class="stat-value" id="stDistancia">-</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Tiempo</span>
            <span class="stat-value" id="stTiempo">-</span>
        </div>    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // Configuración Física
    const PHYSICS = {
        g: 9.81,
        airDensity: 1.225,
        dragCoefficient: 0.47,
        dt: 1/120,
        substeps: 4
    };

    const SCALE = 100; // 1 metro = 100 píxeles

    const PROJECTILES = {
        maiz: { mass: 0.0003, radius: 0.0035, displayRadius: 3.5, color: '#f4d03f' },
        frijol: { mass: 0.0005, radius: 0.0045, displayRadius: 4.5, color: '#9b59b6' }
    };

    let state = {
        projectile: null,
        isFlying: false,
        trail: [],
        maxHeight: 0,
        maxHeightX: 0,
        distance: 0,
        flightTime: 0,
        cannonX: 60,
        cannonY: 460,
        startTime: 0,
        currentAngle: 45,
        targetH: 0,
        targetD: 0
    };

    // Generar objetivos aleatorios dentro de los rangos solicitados
    function generateTargets() {
        // Altura entre 1.0m y 1.7m
        state.targetH = 1.0 + Math.random() * 0.7;
        // Distancia entre 1.5m y 3.0m
        state.targetD = 1.5 + Math.random() * 1.5;

        // Calcular ángulo necesario para cumplir H y D teóricamente (sin aire)
        // tan(theta) = 4 * H / R
        const tanTheta = (4 * state.targetH) / state.targetD;
        const angleRad = Math.atan(tanTheta);
        state.currentAngle = angleRad * (180 / Math.PI);
        // Calcular velocidad necesaria
        // R = (v^2 * sin(2*theta)) / g  =>  v = sqrt( R * g / sin(2*theta) )
        const sin2Theta = Math.sin(2 * angleRad);
        const vIdeal = Math.sqrt((state.targetD * PHYSICS.g) / sin2Theta);

        // Factor de corrección por arrastre aerodinámico
        // Estimamos que necesitamos un ~15% más de energía para compensar el aire en granos ligeros
        const dragCompensation = 1.15; 
        const vFinal = vIdeal * dragCompensation;

        return { angleDeg: state.currentAngle, velocity: vFinal };
    }

    function calculateDragForce(velocity, radius) {
        const area = Math.PI * radius * radius;
        return 0.5 * PHYSICS.airDensity * velocity * velocity * PHYSICS.dragCoefficient * area;
    }

    // === DIBUJADO ===

    function drawBackground() {
        // Fondo oscuro técnico
        const grad = ctx.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, '#050510');
        grad.addColorStop(1, '#101025');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, 400);

        // Grid sutil
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 50) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 400); ctx.stroke();
        }
        for (let y = 0; y < 400; y += 50) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Suelo
        ctx.fillStyle = '#1a2a1a';
        ctx.fillRect(0, 460, canvas.width, 90);
        
        // Marcas de distancia en el suelo
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '10px monospace';
        for (let d = 1; d <= 5; d++) {
            const x = state.cannonX + (d * SCALE);
            ctx.fillRect(x, 460, 1, 5);
            ctx.fillText(`${d}m`, x - 8, 475);        }

        // Muro de fondo
        const brickH = 20;
        const brickW = 40;
        for (let y = 20; y < 450; y += brickH) {
            const offset = (y / brickH) % 2 === 0 ? 0 : brickW / 2;
            for (let x = -brickW; x < canvas.width + brickW; x += brickW) {
                ctx.fillStyle = '#1e1e2e';
                ctx.fillRect(x + offset, y, brickW - 2, brickH - 2);
            }
        }
    }

    function drawCannon(angleDeg) {
        const angleRad = angleDeg * Math.PI / 180;
        const px = state.cannonX;
        const py = state.cannonY;

        ctx.save();
        ctx.translate(px, py);

        // Base
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(-20, -6, 40, 12);
        
        // Ruedas
        ctx.fillStyle = '#1a1a2a';
        ctx.beginPath(); ctx.arc(-15, 6, 10, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15, 6, 10, 0, Math.PI*2); ctx.fill();

        // Cañón rotado
        ctx.rotate(-angleRad);
        ctx.fillStyle = '#6a6a7a';
        ctx.fillRect(0, -6, 60, 12);
        ctx.fillStyle = '#4a4a5a';
        ctx.fillRect(55, -8, 10, 16);

        ctx.restore();

        return {
            x: px + Math.cos(-angleRad) * 65,
            y: py + Math.sin(-angleRad) * 65
        };
    }

    function drawTargets() {
        // Dibujar las "metas" (fantasmas)
        const groundY = state.cannonY + 18;
                // Línea de Altura Objetivo
        const targetHY = state.cannonY - (state.targetH * SCALE);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)'; // Dorado transparente
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(state.cannonX + 20, targetHY); // Un poco a la derecha del cañón
        ctx.lineTo(canvas.width, targetHY);
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255, 215, 0, 0.7)';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`Objetivo h: ${state.targetH.toFixed(2)}m`, state.cannonX + 25, targetHY - 5);

        // Línea de Distancia Objetivo
        const targetDX = state.cannonX + (state.targetD * SCALE);
        ctx.beginPath();
        ctx.moveTo(targetDX, 0);
        ctx.lineTo(targetDX, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.save();
        ctx.translate(targetDX + 15, 150);
        ctx.rotate(-Math.PI/2);
        ctx.fillText(`Objetivo d: ${state.targetD.toFixed(2)}m`, 0, 0);
        ctx.restore();
    }

    function drawProjectile() {
        if (!state.projectile) return;
        const p = state.projectile;

        // Trayectoria
        if (state.trail.length > 1) {
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(state.trail[0].x, state.trail[0].y);
            for (let i = 1; i < state.trail.length; i++) ctx.lineTo(state.trail[i].x, state.trail[i].y);
            if (state.isFlying) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Grano
        ctx.fillStyle = p.prop.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.prop.displayRadius, 0, Math.PI * 2);        ctx.fill();
        
        // Brillo
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(p.x - 1, p.y - 1, p.prop.displayRadius * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawRulers() {
        const groundY = state.cannonY + 18;
        
        // REGLA VERTICAL en altura máxima real
        if (state.maxHeight > 0.1) {
            const yTop = state.cannonY - (state.maxHeight * SCALE);
            const rulerX = state.maxHeightX;

            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(rulerX, groundY);
            ctx.lineTo(rulerX, yTop);
            ctx.stroke();
            ctx.setLineDash([]);

            // Flechas
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(rulerX, yTop); ctx.lineTo(rulerX - 4, yTop + 8); ctx.lineTo(rulerX + 4, yTop + 8); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(rulerX, groundY); ctx.lineTo(rulerX - 4, groundY - 8); ctx.lineTo(rulerX + 4, groundY - 8); ctx.fill();

            // Etiqueta
            const labelY = (groundY + yTop) / 2;
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(rulerX + 6, labelY - 10, 75, 20);
            ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
            ctx.strokeRect(rulerX + 6, labelY - 10, 75, 20);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(`h = ${state.maxHeight.toFixed(2)}m`, rulerX + 10, labelY + 4);
        }

        // REGLA HORIZONTAL en el suelo
        if (state.distance > 0.1) {
            const startX = state.cannonX;
            const endX = state.cannonX + (state.distance * SCALE);
            const rulerY = groundY + 20;
            ctx.strokeStyle = '#00FFFF';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(startX, rulerY);
            ctx.lineTo(endX, rulerY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Flechas
            ctx.fillStyle = '#00FFFF';
            ctx.beginPath();
            ctx.moveTo(startX, rulerY); ctx.lineTo(startX + 8, rulerY - 4); ctx.lineTo(startX + 8, rulerY + 4); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(endX, rulerY); ctx.lineTo(endX - 8, rulerY - 4); ctx.lineTo(endX - 8, rulerY + 4); ctx.fill();

            // Etiqueta
            const midX = (startX + endX) / 2;
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(midX - 45, rulerY + 6, 90, 18);
            ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 1;
            ctx.strokeRect(midX - 45, rulerY + 6, 90, 18);
            
            ctx.fillStyle = '#00FFFF';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(`d = ${state.distance.toFixed(2)}m`, midX - 40, rulerY + 19);
        }
    }

    // === MOTOR FÍSICO ===

    function launch() {
        if (state.isFlying) return;

        const typeKey = document.getElementById('projectileType').value;
        const prop = PROJECTILES[typeKey];
        
        // Generar nuevos objetivos y calcular física
        const { angleDeg, velocity } = generateTargets();
        const angleRad = angleDeg * Math.PI / 180;
        const launchPos = {
            x: state.cannonX + Math.cos(-angleRad) * 65,
            y: state.cannonY + Math.sin(-angleRad) * 65
        };

        state.projectile = {
            x: launchPos.x,
            y: launchPos.y,
            vx: velocity * Math.cos(angleRad) * SCALE,            vy: -velocity * Math.sin(angleRad) * SCALE,
            mass: prop.mass,
            radius: prop.radius,
            prop: prop
        };

        state.isFlying = true;
        state.trail = [];
        state.maxHeight = 0;
        state.maxHeightX = 0;
        state.distance = 0;
        state.flightTime = 0;
        state.startTime = Date.now();

        // UI Updates
        document.getElementById('uiTargetH').textContent = state.targetH.toFixed(2) + 'm';
        document.getElementById('uiTargetD').textContent = state.targetD.toFixed(2) + 'm';
        document.getElementById('uiAngle').textContent = angleDeg.toFixed(1) + '°';
        document.getElementById('stVelocidad').textContent = velocity.toFixed(2) + ' m/s';
        document.getElementById('stEstado').textContent = '✈️ Vuelo';

        requestAnimationFrame(loop);
    }

    function updatePhysics() {
        if (!state.isFlying || !state.projectile) return;

        const p = state.projectile;
        const dt = PHYSICS.dt / PHYSICS.substeps;
        const groundY = state.cannonY + 18;

        for (let step = 0; step < PHYSICS.substeps; step++) {
            const v = Math.sqrt(p.vx * p.vx + p.vy * p.vy) / SCALE;
            
            if (v > 0.01) {
                const dragForce = calculateDragForce(v, p.radius);
                const dragAccel = dragForce / p.mass;
                const ax = -dragAccel * (p.vx / (v * SCALE));
                const ay = PHYSICS.g * SCALE - dragAccel * (p.vy / (v * SCALE));

                p.vx += ax * dt;
                p.vy += ay * dt;
            }

            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }

        if (state.trail.length === 0 || 
            Math.hypot(p.x - state.trail[state.trail.length-1].x, p.y - state.trail[state.trail.length-1].y) > 2) {            state.trail.push({x: p.x, y: p.y});
        }

        const currentHeight = (groundY - p.y) / SCALE;
        if (currentHeight > state.maxHeight) {
            state.maxHeight = currentHeight;
            state.maxHeightX = p.x;
        }

        if (p.y >= groundY) {
            p.y = groundY;
            state.isFlying = false;
            state.distance = (p.x - state.cannonX) / SCALE;
            state.flightTime = (Date.now() - state.startTime) / 1000;

            document.getElementById('stEstado').textContent = '✅ Impacto';
            document.getElementById('stAlturaReal').textContent = state.maxHeight.toFixed(2) + ' m';
            document.getElementById('stDistancia').textContent = state.distance.toFixed(2) + ' m';
            document.getElementById('stTiempo').textContent = state.flightTime.toFixed(2) + ' s';
        }

        if (p.x > canvas.width + 50) {
            state.isFlying = false;
            document.getElementById('stEstado').textContent = '❌ Fuera';
        }
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawTargets(); // Dibujar objetivos antes que el cañón
        drawCannon(state.currentAngle);
        updatePhysics();
        drawRulers();
        drawProjectile();

        if (state.isFlying) {
            document.getElementById('stAlturaReal').textContent = state.maxHeight.toFixed(2) + ' m';
            requestAnimationFrame(loop);
        }
    }

    function resetSim() {
        state.isFlying = false;
        state.projectile = null;
        state.trail = [];
        state.maxHeight = 0;
        state.maxHeightX = 0;
        state.distance = 0;
        state.flightTime = 0;
        document.getElementById('stEstado').textContent = 'Listo';
        document.getElementById('stVelocidad').textContent = '-';
        document.getElementById('stAlturaReal').textContent = '-';
        document.getElementById('stDistancia').textContent = '-';
        document.getElementById('stTiempo').textContent = '-';
        
        // Ocultar objetivos al reiniciar
        document.getElementById('uiTargetH').textContent = '-';
        document.getElementById('uiTargetD').textContent = '-';
        document.getElementById('uiAngle').textContent = '-';

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawCannon(45);
    }

    // Inicializar
    drawBackground();
    drawCannon(45);

</script>
</body>
</html>
